name: CI - Meson

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config python3-pip python3-venv ninja-build git libgraphene-1.0-dev libgirepository1.0-dev gobject-introspection
        # Optional XCB/X11 deps (so xlibre shim tests can run if available)
        sudo apt-get install -y libxcb1-dev libxcb-util0-dev libxcb-randr0-dev libxcb-res0-dev libx11-dev libx11-xcb-dev || true

    - name: Install Meson
      run: |
        pip3 install --upgrade pip
        pip3 install meson ninja

    - name: Configure Meson
      working-directory: ${{ github.workspace }}
      run: |
        meson setup build --wipe || meson setup build

    - name: Build (compile tests)
      working-directory: ${{ github.workspace }}
      run: |
        meson compile -C build || true

    - name: Run tests
      working-directory: ${{ github.workspace }}
      run: |
        meson test -C build --no-rebuild || true

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: meson-test-log
        path: build/meson-logs/testlog.txt
